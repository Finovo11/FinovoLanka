

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FINOVO.LK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:linear-gradient(135deg,#ff7a00,#ffb347);
padding:15px;
}

.container{
max-width:430px;
margin:auto;
background:#fff;
border-radius:30px;

}

.logo{

}

.slider{

overflow:hidden;
background:white;
}

.slide{
position:absolute;

}

}

.card{
background:#fafafa;

}

h2{
text-align:center;

}

select,
button{

}

button{
background:#ff7a00;

}

.result{
display:none;
margin-top:15px;
padding:15px;
background:#fff4ec;

line-height:2;
}

.apply{
display:none;
margin-top:15px;
background:#25D366;
color:white;
padding:15px;
text-align:center;
text-decoration:none;
border-radius:12px;
font-weight:bold;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#ff7a00;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
FINOVO.LK
</div>

<div>
Fast • Easy • Reliable
</div>

<div class="slider">

<img class="slide active"
src="https://i.ibb.co/gZ2R618f/Whats-App-Image-2026-06-18-at-02-33-54.jpg">

<img class="slide"
src="https://i.ibb.co/Mb2NBtW/Whats-App-Image-2026-06-18-at-02-33-55.jpg">

</div>

</div>

<div class="content">

<div class="card">

<h2>
💰 Loan Apply
</h2>

<select id="amount">

<option value="">
Select Amount
</option>

<option value="40000">
Rs.40,000
</option>

<option value="50000">
Rs.50,000
</option>

<option value="100000">
Rs.100,000
</option>

<option value="200000">
Rs.200,000
</option>

<option value="300000">
Rs.300,000
</option>

<option value="500000">
Rs.500,000
</option>

</select>

<button onclick="nextStep()">
➡️ NEXT
</button>

<div id="result"
class="result">
</div>

<a
id="apply"
class="apply"
href="https://forms.gle/rnLH69fTA4xhgwJ9A"
target="_blank">

🚀 APPLY NOW

</a>

</div>

</div>

</div>

<script>

function nextStep(){

let amount=
parseInt(
document
.getElementById(
"amount"
).value
);

if(!amount){

alert(
"Select Loan Amount"
);

return;

}

let months;

if(amount<=50000)
months=4;

else if(amount<=100000)
months=8;

else if(amount<=200000)
months=12;

else if(amount<=300000)
months=16;

else
months=24;

let interest=
amount*0.08;

let total=
amount+
interest;

let monthly=
(
total/months
)
.toFixed(2);

let html=

`
<h3>
📋 Loan Summary
</h3>

Loan :
Rs.${amount}

<br>

Interest :
Rs.${interest}

<br>

Total :
Rs.${total}

<br>

Monthly :
Rs.${monthly}

<br>

Months :
${months}

<table>

<tr>

<th>Month</th>

<th>Installment</th>

</tr>

`;

for(
let i=1;
i<=months;
i++
){

html+=

`
<tr>

<td>
${i}
</td>

<td>
Rs.${monthly}
</td>

</tr>
`;

}

html+=
`</table>`;

document
.getElementById(
"result"
)
.innerHTML=
html;

document
.getElementById(
"result"
)
.style
.display=
"block";

document
.getElementById(
"apply"
)
.style
.display=
"block";

}

let slides=
document
.querySelectorAll(
".slide"
);

let i=0;

setInterval(()=>{

slides[i]
.classList
.remove(
"active"
);

i=
(
i+1
)
%
slides.length;

slides[i]
.classList
.add(
"active"
);

},3000);

</script>

</body>
</html>
```

මේකේ දැන් **වාරික (Monthly Installment)** සහ **Month table** දෙකම පේනවා.
