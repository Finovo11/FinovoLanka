<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINOVO.LK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff7a00,#ffb347);
padding:15px;
min-height:100vh;
}

.container{
max-width:430px;
margin:auto;
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header{
background:linear-gradient(135deg,#ff7a00,#ff9900);
color:white;
text-align:center;
padding:25px;
}

.logo{
font-size:32px;
font-weight:bold;
}

.tagline{
margin-top:5px;
font-size:14px;
}

.slider{
position:relative;
height:220px;
overflow:hidden;
margin-top:15px;
border-radius:15px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.content{
padding:20px;
}

.card{
background:#f8f8f8;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ff7a00;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#e66a00;
}

.result{
display:none;
background:#fff5ee;
padding:15px;
border-radius:15px;
border:2px solid #ff7a00;
margin-top:15px;
line-height:1.8;
}

.apply-btn{
display:none;
margin-top:15px;
padding:15px;
background:#25D366;
color:white;
text-decoration:none;
text-align:center;
border-radius:12px;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.contact{
text-align:center;
padding:20px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">FINOVO.LK</div>

<div class="tagline">
Fast • Easy • Reliable
</div>

<div class="slider">
<img src="image1.jpg" class="slide active">
<img src="image2.jpg" class="slide">
</div>

</div>

<div class="content">

<div class="card">

<h2>💰 Loan Calculator</h2>
<br>

<label>📅 Application Date</label>
<input type="date" id="applyDate">

<label>💵 Select Loan Amount</label>

<select id="loanAmount">
<option value="">Select Amount</option>
<option value="40000">Rs. 40,000</option>
<option value="50000">Rs. 50,000</option>
<option value="60000">Rs. 60,000</option>
<option value="80000">Rs. 80,000</option>
<option value="100000">Rs. 100,000</option>
<option value="150000">Rs. 150,000</option>
<option value="200000">Rs. 200,000</option>
<option value="250000">Rs. 250,000</option>
<option value="300000">Rs. 300,000</option>
<option value="350000">Rs. 350,000</option>
<option value="400000">Rs. 400,000</option>
<option value="450000">Rs. 450,000</option>
<option value="500000">Rs. 500,000</option>
</select>

<button onclick="calculateLoan()">
📊 Calculate Loan
</button>

<div id="result" class="result"></div>

<a href="YOUR_GOOGLE_FORM_LINK"
target="_blank"
id="applyBtn"
class="apply-btn">
🚀 Apply Now
</a>

</div>

</div>

<div class="contact">
📞 072 396 5406<br>
📲 WhatsApp Support Available 24/7
</div>

</div>

<a href="https://wa.me/94723965406"
class="whatsapp"
target="_blank">
💬
</a>

<script>

document.getElementById("applyDate").value =
new Date().toISOString().split("T")[0];

function calculateLoan(){

const amount =
parseInt(document.getElementById("loanAmount").value);

const applyDate =
document.getElementById("applyDate").value;

if(!amount){
alert("Please Select Loan Amount");
return;
}

let months=0;

if(amount===40000) months=4;
else if(amount===50000) months=4;
else if(amount===60000) months=6;
else if(amount===80000) months=6;
else if(amount===100000) months=8;
else if(amount>100000 && amount<=200000) months=12;
else if(amount>200000 && amount<=300000) months=16;
else if(amount>300000 && amount<=400000) months=20;
else if(amount>400000 && amount<=500000) months=24;

const interest = amount * 0.08;
const total = amount + interest;
const monthly = total / months;

const startDate = new Date(applyDate);
const endDate = new Date(applyDate);

endDate.setMonth(endDate.getMonth()+months);

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h3>📋 Loan Summary</h3><br>

💵 Loan Amount:
Rs. ${amount.toLocaleString()}<br>

📈 Interest (8%):
Rs. ${interest.toLocaleString()}<br>

💰 Total Payable:
Rs. ${total.toLocaleString()}<br>

📆 Loan Period:
${months} Months<br>

💳 Monthly Installment:
Rs. ${monthly.toFixed(2)}<br>

📅 Application Date:
${startDate.toLocaleDateString()}<br>

🏁 Final Payment Date:
${endDate.toLocaleDateString()}
`;

document.getElementById("applyBtn").style.display="block";

}

let slides=document.querySelectorAll(".slide");
let current=0;

setInterval(function(){

slides[current].classList.remove("active");

current=(current+1)%slides.length;

slides[current].classList.add("active");

},3000);

</script>

</body>
</html>
