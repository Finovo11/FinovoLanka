<div class="tagline">

</div>

class="slide">

</div>

<div class="content">

<div class="loan-card">

<h2>💰 Loan Calculator</h2>

<label>📅 Application Date</label>
<input type="date" id="applyDate">

<label>💵 Select Loan Amount</label>

<select id="loanAmount">

<option value="">Select Amount</option>

<option value="40000">Rs.40,000</option>
<option value="50000">Rs.50,000</option>
<option value="60000">Rs.60,000</option>
<option value="80000">Rs.80,000</option>
<option value="100000">Rs.100,000</option>
<option value="150000">Rs.150,000</option>
<option value="200000">Rs.200,000</option>
<option value="300000">Rs.300,000</option>
<option value="500000">Rs.500,000</option>

</select>

<button onclick="calculateLoan()">
📊 Calculate Loan
</button>

<div id="result" class="result"></div>

<div id="schedule" class="schedule"></div>

<a
href="https://forms.gle/rnLH69fTA4xhgwJ9A"
target="_blank"
class="apply-btn"
id="applyBtn">

🚀 Apply Now

</a>

</div>

</div>

<div class="contact">

📞 072 396 5406

<br>

📲 WhatsApp Support Available

</div>

</div>

<a
href="https://wa.me/94723965406"
target="_blank"
class="whatsapp">

💬

</a>

<script>

document
.getElementById(
"applyDate"
)
.value=
new Date()
.toISOString()
.split("T")[0];

function calculateLoan(){

let amount=
parseInt(
document
.getElementById(
"loanAmount"
).value
);

if(!amount){

alert(
"Please Select Loan Amount"
);

return;

}

let months=
Math.ceil(
amount/25000
);

let interest=
amount*0.08;

let total=
amount+
interest;

let monthly=
(
total/months
)
.toFixed(2);

document
.getElementById(
"result"
)
.style.display=
"block";

document
.getElementById(
"result"
)
.innerHTML=

`

<h3>📋 Loan Summary</h3>

Loan:
Rs.${amount}

<br>

Interest:
Rs.${interest}

<br>

Total:
Rs.${total}

<br>

Period:
${months} Months

<br>

Monthly:
Rs.${monthly}

`;

let html=
`
<table>

<tr>

<th>Month</th>

<th>Installment</th>

</tr>
`;

for(
let i=1;
i<=months;
i++
){

html+=

`
<tr>

<td>${i}</td>

<td>Rs.${monthly}</td>

</tr>
`;

}

html+=
`</table>`;

schedule.innerHTML=
html;

applyBtn.style.display=
"block";

}

let slides=
document
.querySelectorAll(
".slide"
);

let current=0;

setInterval(()=>{

slides[current]
.classList
.remove(
"active"
);

current=
(
current+1
)
%
slides.length;

slides[current]
.classList
.add(
"active"
);

},3000);

</script>

</body>
</html>
