<script>

applyDate.value=

.toISOString()
.split("T")[0];

function calculateLoan(){

let amount=
parseInt(
loanAmount.value
);

if(!amount){

alert(
"Please Select Loan Amount"
);

return;

}

let months=0;

if(amount<=50000)
months=4;

else if(amount<=100000)
months=8;

else if(amount<=200000)
months=12;

else if(amount<=300000)
months=16;

else
months=24;

let interest=
amount*0.08;

let total=
amount+
interest;

let monthly=
(
total/months
)
.toFixed(2);

result.style.display=
"block";

result.innerHTML=

`

<h3>
📋 Loan Summary
</h3>

💵 Loan :
Rs.${amount.toLocaleString()}

<br>

Rs.${interest.toLocaleString()}

<br>

💰 Total :
Rs.${total.toLocaleString()}

<br>

💳 Monthly :
Rs.${monthly}

<br>

📆 Months :
${months}

`;

let table=
`
<table>

<tr>

<th>Month</th>

<th>Installment</th>

</tr>
`;

for(
let i=1;
i<=months;
i++
){

table+=

`

<td>${i}</td>

<td>Rs.${monthly}</td>

</tr>

`;

}

table+=
`</table>`;

schedule.innerHTML=
table;

"block";

}
